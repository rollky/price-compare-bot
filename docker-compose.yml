version: '3.8'

services:
  app:
    build: .
    container_name: price-bot
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    restart: always

  redis:
    image: redis:7-alpine
    container_name: price-bot-redis
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
