<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公众号菜单管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-danger {
            background: #ff4d4f;
            color: white;
        }

        .btn-danger:hover {
            background: #ff7875;
        }

        .btn-success {
            background: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background: #73d13d;
        }

        .btn-default {
            background: #fff;
            border: 1px solid #d9d9d9;
            color: #666;
        }

        .btn-default:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .menu-preview {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 20px;
            min-height: 400px;
            position: relative;
        }

        .phone-frame {
            width: 375px;
            height: 600px;
            background: white;
            border-radius: 20px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .phone-header {
            height: 60px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .phone-content {
            flex: 1;
            background: #f5f5f5;
            padding: 20px;
            overflow-y: auto;
        }

        .phone-menu {
            height: 50px;
            background: #fafafa;
            border-top: 1px solid #e8e8e8;
            display: flex;
        }

        .menu-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #e8e8e8;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            position: relative;
        }

        .menu-item:last-child {
            border-right: none;
        }

        .menu-item:hover {
            background: #f0f0f0;
        }

        .sub-menu {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            display: none;
        }

        .sub-menu.active {
            display: block;
        }

        .sub-menu-item {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .sub-menu-item:last-child {
            border-bottom: none;
        }

        .sub-menu-item:hover {
            background: #f5f5f5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #1890ff;
        }

        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .menu-editor {
            margin-top: 20px;
        }

        .menu-button-editor {
            background: #f9f9f9;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .menu-button-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .sub-button-list {
            margin-left: 20px;
            margin-top: 12px;
        }

        .action-bar {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            color: white;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .toast-success {
            background: #52c41a;
        }

        .toast-error {
            background: #ff4d4f;
        }

        .nav-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e8e8e8;
        }

        .nav-tab {
            padding: 10px 0;
            cursor: pointer;
            color: #666;
            border-bottom: 2px solid transparent;
        }

        .nav-tab.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 公众号菜单管理</h1>
            <div>
                <a href="keywords.html" style="margin-right: 10px; color: #666; text-decoration: none;">关键词管理</a>
                <a href="riddles.html" style="margin-right: 10px; color: #666; text-decoration: none;">猜谜题库</a>
                <button class="btn btn-primary" onclick="createDefaultMenu()">恢复默认菜单</button>
            </div>
        </div>

        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('preview')">菜单预览</div>
            <div class="nav-tab" onclick="switchTab('edit')">编辑菜单</div>
        </div>

        <!-- 预览模式 -->
        <div id="previewTab" class="card">
            <div class="menu-preview">
                <div class="phone-frame">
                    <div class="phone-header">公众号</div>
                    <div class="phone-content">
                        <div style="text-align: center; color: #999; margin-top: 100px;">
                            点击下方菜单查看效果
                        </div>
                    </div>
                    <div class="phone-menu" id="phoneMenu">
                        <!-- 动态生成菜单 -->
                    </div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-success" onclick="publishMenu()">发布到公众号</button>
                <button class="btn btn-danger" onclick="deleteMenu()">删除菜单</button>
            </div>
        </div>

        <!-- 编辑模式 -->
        <div id="editTab" class="card" style="display: none;">
            <div class="menu-editor" id="menuEditor">
                <!-- 动态生成编辑器 -->
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="addMenuButton()">+ 添加一级菜单</button>
                <button class="btn btn-success" onclick="saveMenu()">保存并发布</button>
            </div>
        </div>
    </div>

    <!-- 添加子菜单弹窗 -->
    <div class="modal" id="subMenuModal">
        <div class="modal-content">
            <div class="modal-header">添加子菜单</div>
            <div class="form-group">
                <label class="form-label">菜单名称</label>
                <input type="text" class="form-input" id="subMenuName" placeholder="如：今日热门">
            </div>
            <div class="form-group">
                <label class="form-label">菜单类型</label>
                <select class="form-select" id="subMenuType">
                    <option value="click">点击事件（发送关键词）</option>
                    <option value="view">跳转网页</option>
                </select>
            </div>
            <div class="form-group" id="keyGroup">
                <label class="form-label">事件Key</label>
                <select class="form-select" id="subMenuKey">
                    <option value="MENU_HOT">今日热门</option>
                    <option value="MENU_HELP">使用帮助</option>
                    <option value="MENU_RIDDLE">猜谜游戏</option>
                    <option value="MENU_WALLPAPER">领壁纸</option>
                </select>
            </div>
            <div class="form-group" id="urlGroup" style="display: none;">
                <label class="form-label">网页链接</label>
                <input type="text" class="form-input" id="subMenuUrl" placeholder="https://...">
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeSubMenuModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmAddSubMenu()">添加</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = '/admin';
        let authHeader = '';
        let currentMenu = [];
        let currentParentIndex = -1;

        // 默认菜单配置
        const defaultMenu = [
            {
                name: '查优惠券',
                sub_buttons: [
                    { name: '今日热门', type: 'click', key: 'MENU_HOT' },
                    { name: '使用帮助', type: 'click', key: 'MENU_HELP' },
                    { name: '猜谜游戏', type: 'click', key: 'MENU_RIDDLE' }
                ]
            },
            {
                name: '领福利',
                type: 'click',
                key: 'MENU_WALLPAPER'
            },
            {
                name: '流量卡',
                type: 'view',
                url: 'https://ka.huojukj.com/?u=112233'
            }
        ];

        // 检查登录
        function checkAuth() {
            authHeader = localStorage.getItem('admin_auth');
            if (!authHeader) {
                window.location.href = 'keywords.html';
                return false;
            }
            return true;
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'preview') {
                document.getElementById('previewTab').style.display = 'block';
                document.getElementById('editTab').style.display = 'none';
                renderPhoneMenu();
            } else {
                document.getElementById('previewTab').style.display = 'none';
                document.getElementById('editTab').style.display = 'block';
                renderEditor();
            }
        }

        // 获取当前菜单
        async function loadMenu() {
            if (!checkAuth()) return;

            try {
                const response = await fetch(`${API_BASE}/menu`, {
                    headers: { 'Authorization': authHeader }
                });

                if (response.status === 401) {
                    localStorage.removeItem('admin_auth');
                    window.location.href = 'keywords.html';
                    return;
                }

                const data = await response.json();
                if (data.data && data.data.button) {
                    currentMenu = data.data.button;
                } else {
                    currentMenu = JSON.parse(JSON.stringify(defaultMenu));
                }
                renderPhoneMenu();
            } catch (error) {
                showToast('加载菜单失败：' + error.message, 'error');
                currentMenu = JSON.parse(JSON.stringify(defaultMenu));
                renderPhoneMenu();
            }
        }

        // 渲染手机预览
        function renderPhoneMenu() {
            const container = document.getElementById('phoneMenu');
            container.innerHTML = '';

            currentMenu.forEach((btn, index) => {
                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';
                menuItem.textContent = btn.name;

                if (btn.sub_buttons && btn.sub_buttons.length > 0) {
                    const subMenu = document.createElement('div');
                    subMenu.className = 'sub-menu';
                    subMenu.id = `subMenu${index}`;

                    btn.sub_buttons.forEach(sub => {
                        const subItem = document.createElement('div');
                        subItem.className = 'sub-menu-item';
                        subItem.textContent = sub.name;
                        subItem.onclick = (e) => {
                            e.stopPropagation();
                            showToast(`点击了：${sub.name}`);
                        };
                        subMenu.appendChild(subItem);
                    });

                    menuItem.appendChild(subMenu);
                    menuItem.onclick = () => {
                        document.querySelectorAll('.sub-menu').forEach(s => s.classList.remove('active'));
                        subMenu.classList.toggle('active');
                    };
                } else {
                    menuItem.onclick = () => {
                        showToast(`点击了：${btn.name}`);
                    };
                }

                container.appendChild(menuItem);
            });
        }

        // 渲染编辑器
        function renderEditor() {
            const container = document.getElementById('menuEditor');
            container.innerHTML = '';

            currentMenu.forEach((btn, index) => {
                const editor = document.createElement('div');
                editor.className = 'menu-button-editor';
                editor.innerHTML = `
                    <div class="menu-button-header">
                        <input type="text" class="form-input" value="${btn.name}"
                               onchange="updateMenuName(${index}, this.value)"
                               style="width: 200px;" placeholder="菜单名称">
                        <div>
                            <button class="btn btn-default" onclick="addSubButton(${index})">+ 子菜单</button>
                            <button class="btn btn-danger" onclick="removeMenuButton(${index})">删除</button>
                        </div>
                    </div>
                    ${btn.sub_buttons ? `
                        <div class="sub-button-list">
                            ${btn.sub_buttons.map((sub, subIndex) => `
                                <div style="display: flex; gap: 10px; margin-bottom: 8px; align-items: center;">
                                    <input type="text" class="form-input" value="${sub.name}"
                                           onchange="updateSubMenuName(${index}, ${subIndex}, this.value)"
                                           style="width: 150px;" placeholder="子菜单名称">
                                    <select class="form-select" onchange="updateSubMenuType(${index}, ${subIndex}, this.value)" style="width: 150px;">
                                        <option value="click" ${sub.type === 'click' ? 'selected' : ''}>点击事件</option>
                                        <option value="view" ${sub.type === 'view' ? 'selected' : ''}>跳转网页</option>
                                    </select>
                                    ${sub.type === 'click' ? `
                                        <select class="form-select" onchange="updateSubMenuKey(${index}, ${subIndex}, this.value)" style="width: 150px;">
                                            <option value="MENU_HOT" ${sub.key === 'MENU_HOT' ? 'selected' : ''}>今日热门</option>
                                            <option value="MENU_HELP" ${sub.key === 'MENU_HELP' ? 'selected' : ''}>使用帮助</option>
                                            <option value="MENU_RIDDLE" ${sub.key === 'MENU_RIDDLE' ? 'selected' : ''}>猜谜游戏</option>
                                            <option value="MENU_WALLPAPER" ${sub.key === 'MENU_WALLPAPER' ? 'selected' : ''}>领壁纸</option>
                                        </select>
                                    ` : `
                                        <input type="text" class="form-input" value="${sub.url || ''}"
                                               onchange="updateSubMenuUrl(${index}, ${subIndex}, this.value)"
                                               style="width: 200px;" placeholder="https://...">
                                    `}
                                    <button class="btn btn-danger" onclick="removeSubButton(${index}, ${subIndex})">删除</button>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div style="margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 4px;">
                            <label style="font-size: 12px; color: #666;">
                                ${btn.type === 'view' ? `链接：${btn.url}` : `事件：${btn.key}`}
                            </label>
                        </div>
                    `}
                `;
                container.appendChild(editor);
            });
        }

        // 更新菜单名称
        function updateMenuName(index, value) {
            currentMenu[index].name = value;
        }

        // 更新子菜单名称
        function updateSubMenuName(parentIndex, subIndex, value) {
            currentMenu[parentIndex].sub_buttons[subIndex].name = value;
        }

        // 更新子菜单类型
        function updateSubMenuType(parentIndex, subIndex, value) {
            currentMenu[parentIndex].sub_buttons[subIndex].type = value;
            if (value === 'click') {
                currentMenu[parentIndex].sub_buttons[subIndex].key = 'MENU_HOT';
                delete currentMenu[parentIndex].sub_buttons[subIndex].url;
            } else {
                currentMenu[parentIndex].sub_buttons[subIndex].url = '';
                delete currentMenu[parentIndex].sub_buttons[subIndex].key;
            }
            renderEditor();
        }

        // 更新子菜单key
        function updateSubMenuKey(parentIndex, subIndex, value) {
            currentMenu[parentIndex].sub_buttons[subIndex].key = value;
        }

        // 更新子菜单url
        function updateSubMenuUrl(parentIndex, subIndex, value) {
            currentMenu[parentIndex].sub_buttons[subIndex].url = value;
        }

        // 添加一级菜单
        function addMenuButton() {
            if (currentMenu.length >= 3) {
                showToast('最多只能有3个一级菜单', 'error');
                return;
            }
            currentMenu.push({
                name: '新菜单',
                type: 'click',
                key: 'MENU_HOT'
            });
            renderEditor();
        }

        // 删除一级菜单
        function removeMenuButton(index) {
            currentMenu.splice(index, 1);
            renderEditor();
        }

        // 添加子菜单
        function addSubButton(index) {
            if (!currentMenu[index].sub_buttons) {
                currentMenu[index].sub_buttons = [];
                delete currentMenu[index].type;
                delete currentMenu[index].key;
                delete currentMenu[index].url;
            }

            if (currentMenu[index].sub_buttons.length >= 5) {
                showToast('最多只能有5个子菜单', 'error');
                return;
            }

            currentMenu[index].sub_buttons.push({
                name: '子菜单',
                type: 'click',
                key: 'MENU_HOT'
            });
            renderEditor();
        }

        // 删除子菜单
        function removeSubButton(parentIndex, subIndex) {
            currentMenu[parentIndex].sub_buttons.splice(subIndex, 1);
            if (currentMenu[parentIndex].sub_buttons.length === 0) {
                delete currentMenu[parentIndex].sub_buttons;
                currentMenu[parentIndex].type = 'click';
                currentMenu[parentIndex].key = 'MENU_HOT';
            }
            renderEditor();
        }

        // 保存并发布菜单
        async function saveMenu() {
            try {
                const response = await fetch(`${API_BASE}/menu/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': authHeader
                    },
                    body: JSON.stringify({ buttons: currentMenu })
                });

                const data = await response.json();

                if (data.code === 0) {
                    showToast('菜单发布成功！');
                    switchTab('preview');
                } else {
                    showToast(data.message || '发布失败', 'error');
                }
            } catch (error) {
                showToast('发布失败：' + error.message, 'error');
            }
        }

        // 发布到公众号
        async function publishMenu() {
            await saveMenu();
        }

        // 删除菜单
        async function deleteMenu() {
            if (!confirm('确定要删除所有菜单吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/menu`, {
                    method: 'DELETE',
                    headers: { 'Authorization': authHeader }
                });

                const data = await response.json();

                if (data.code === 0) {
                    showToast('菜单已删除');
                    currentMenu = [];
                    renderPhoneMenu();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败：' + error.message, 'error');
            }
        }

        // 恢复默认菜单
        async function createDefaultMenu() {
            if (!confirm('确定要恢复默认菜单吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/menu/create-default`, {
                    method: 'POST',
                    headers: { 'Authorization': authHeader }
                });

                const data = await response.json();

                if (data.code === 0) {
                    showToast('默认菜单已创建');
                    loadMenu();
                } else {
                    showToast(data.message || '创建失败', 'error');
                }
            } catch (error) {
                showToast('创建失败：' + error.message, 'error');
            }
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 初始化
        loadMenu();
    </script>
</body>
</html>
